<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Martin dessin</title>
  <link rel="stylesheet" href="static/style.css">
</head>
<body>

  <div class="auth-page-header">
    <i data-lucide="pen-line" class="lucide-auth-logo" aria-hidden="true"></i>
    <h1>Martin dessin</h1>
    <p class="auth-tagline">Connecte-toi avec Google, ou continue comme invité.</p>
  </div>

  <div class="auth-container">
    <a href="auth/google/start" class="google-auth-button btn-with-icon">
      <i data-lucide="log-in" aria-hidden="true"></i>
      <span>Continuer avec Google</span>
    </a>
    <a href="./" class="guest-link">Continuer en invité</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/lucide@0.469.0/dist/umd/lucide.min.js"></script>
  <script src="static/auth.js"></script>
  <script>
    if (typeof lucide !== "undefined") lucide.createIcons();
  </script>
</body>
</html>
