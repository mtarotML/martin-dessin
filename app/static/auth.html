<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Martin dessin</title>
  <link rel="stylesheet" href="static/style.css">
</head>
<body>

  <div class="auth-page-header">
    <i data-lucide="pen-line" class="lucide-auth-logo" aria-hidden="true"></i>
    <h1>Martin dessin</h1>
    <p class="auth-tagline">Connecte-toi pour dessiner et partager</p>
  </div>

  <div class="auth-container">
    <div class="auth-tabs">
      <button type="button" class="tab active btn-with-icon" id="tab-login">
        <i data-lucide="log-in" aria-hidden="true"></i>
        <span>Se connecter</span>
      </button>
      <button type="button" class="tab btn-with-icon" id="tab-register">
        <i data-lucide="user-plus" aria-hidden="true"></i>
        <span>Créer un compte</span>
      </button>
    </div>

    <form id="login-form" class="auth-form">
      <input type="text" name="username" placeholder="Nom d'utilisateur" required autocomplete="username">
      <input type="password" name="password" placeholder="Mot de passe" required autocomplete="current-password">
      <button type="submit" class="auth-submit btn-with-icon">
        <i data-lucide="log-in" aria-hidden="true"></i>
        <span>Connexion</span>
      </button>
      <p class="auth-error" id="login-error"></p>
    </form>

    <form id="register-form" class="auth-form hidden">
      <input type="text" name="username" placeholder="Nom d'utilisateur" required autocomplete="username">
      <input type="email" name="email" placeholder="Email" required autocomplete="email">
      <input type="password" name="password" placeholder="Mot de passe (4 car. min)" required minlength="4" autocomplete="new-password">
      <button type="submit" class="auth-submit btn-with-icon">
        <i data-lucide="user-plus" aria-hidden="true"></i>
        <span>Créer le compte</span>
      </button>
      <p class="auth-error" id="register-error"></p>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/lucide@0.469.0/dist/umd/lucide.min.js"></script>
  <script src="static/auth.js"></script>
  <script>
    if (typeof lucide !== "undefined") lucide.createIcons();
  </script>
</body>
</html>
