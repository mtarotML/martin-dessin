# Local  : docker compose up --build           → db + web (localhost:8000)
# Serveur: COMPOSE_PROFILES=proxy dans .env   → db + web + nginx (80/443)
#
# Certificat Let's Encrypt (sur la VM) :
#   sudo certbot certonly --webroot -w "$(pwd)/certbot-webroot" \
#     -d martintarot.com -d www.martintarot.com

services:
  db:
    image: postgres:15-alpine
    restart: ${RESTART_POLICY:-no}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build: .
    restart: ${RESTART_POLICY:-no}
    environment:
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    ports:
      - "127.0.0.1:${WEB_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 25s

  nginx:
    image: nginx:alpine
    restart: ${RESTART_POLICY:-no}
    profiles: [proxy]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot-webroot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      web:
        condition: service_healthy

volumes:
  pgdata:
