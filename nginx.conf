events {}

http {
    server {
        listen 80;
        
        # On renvoie tout le trafic vers le service 'web' sur son port interne
        location / {
            proxy_pass http://web:8000; # <--- Assure-toi que c'est le port interne de ton app
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
