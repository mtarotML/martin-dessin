events {}

http {
    server {
        listen 80;

        location = /martin-dessin {
            return 301 /martin-dessin/;
        }

        location /martin-dessin/ {
            rewrite ^/martin-dessin/(.*)$ /$1 break;
            proxy_pass http://web:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /martin-dessin;
        }

        location = /fashion-mnist {
            return 301 /fashion-mnist/;
        }

        location /fashion-mnist/ {
            rewrite ^/fashion-mnist/(.*)$ /$1 break;
            proxy_pass https://project.martintarot.com;
            proxy_ssl_server_name on;
            proxy_set_header Host project.martintarot.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /fashion-mnist;
        }

        location / {
            proxy_pass https://mtarotml.github.io/website/;
            proxy_ssl_server_name on;
            proxy_set_header Host mtarotml.github.io;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
