events {}

http {
    resolver 8.8.8.8 ipv6=off valid=60s;

    server {
        listen 80;

        # --- Projet 1: Martin Dessin ---
        location /martin-dessin/ {
            proxy_pass http://web:8000/; # Le "/" à la fin fait le "rewrite" automatiquement !
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Prefix /martin-dessin;
            # ... autres headers ...
        }

        # --- Projet 2: Fashion MNIST ---
        location /fashion-mnist/ {
            proxy_pass https://project.martintarot.com/; # Le "/" à la fin supprime le préfixe /fashion-mnist/
            proxy_ssl_server_name on;
            proxy_set_header Host project.martintarot.com;
            # ... autres headers ...
        }

        # --- TON SITE PRINCIPAL (GitHub Pages) ---
        
        # On intercepte les requêtes qui cherchent explicitement /website/
        # pour éviter le doublon /website/website/
        location /website/ {
            proxy_pass https://mtarotml.github.io/website/;
            proxy_ssl_server_name on;
            proxy_set_header Host mtarotml.github.io;
        }

        # Racine du domaine : tout ce qui n'est pas martin-dessin ou fashion-mnist
        location / {
            proxy_pass https://mtarotml.github.io/website/;
            proxy_ssl_server_name on;
            proxy_set_header Host mtarotml.github.io;
            
            # Important pour que GitHub sache d'où vient la requête
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}