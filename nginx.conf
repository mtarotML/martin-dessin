events {}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    # HTTP: ACME challenges + redirect to HTTPS
    server {
        listen 80 default_server;
        server_name martintarot.com www.martintarot.com;

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS: www → sans www
    server {
        listen 443 ssl;
        server_name www.martintarot.com;

        ssl_certificate     /etc/letsencrypt/live/martintarot.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/martintarot.com/privkey.pem;

        return 301 https://martintarot.com$request_uri;
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name martintarot.com;

        ssl_certificate     /etc/letsencrypt/live/martintarot.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/martintarot.com/privkey.pem;

        # Martin Dessin
        location = /martin-dessin { return 301 $scheme://$http_host/martin-dessin/; }

        location /martin-dessin/ {
            set $martin_web web:8000;
            rewrite ^/martin-dessin/(.*)$ /$1 break;
            proxy_pass http://$martin_web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Prefix /martin-dessin;
        }

        # Fashion MNIST (Heroku)
        location = /fashion-mnist { return 301 $scheme://$http_host/fashion-mnist/; }

        location /fashion-mnist/ {
            set $fashion_upstream my-fashion-mnist-462930362bf7.herokuapp.com;
            rewrite ^/fashion-mnist/(.*)$ /$1 break;
            proxy_pass https://$fashion_upstream;
            proxy_ssl_server_name on;
            proxy_ssl_name my-fashion-mnist-462930362bf7.herokuapp.com;
            proxy_set_header Host my-fashion-mnist-462930362bf7.herokuapp.com;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Site principal (GitHub Pages)
        location / {
            set $github_pages mtarotml.github.io;
            rewrite ^/$ /website/ break;
            rewrite ^/(.+)$ /website/$1 break;
            proxy_pass https://$github_pages;
            proxy_ssl_server_name on;
            proxy_ssl_name mtarotml.github.io;
            proxy_set_header Host mtarotml.github.io;
            proxy_redirect https://mtarotml.github.io/website/ /;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
